{% extends "base.html" %}
{% block titulo %}Nuevo albarán{% endblock %}
{% block contenido %}
{% include 'partials/volver_bar.html' %}
<h1 class="h4 mb-3"><i class="bi bi-plus-circle me-2"></i>Nuevo albarán</h1>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <p class="small text-muted">Opcionalmente adjunta ya el PDF o foto del albarán. Podrás añadir líneas en el siguiente paso.</p>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Proveedor</label>
            <input type="text" name="proveedor" class="form-control" placeholder="Nombre del proveedor">
          </div>
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <label class="form-label">Nº documento</label>
              <input type="text" name="numero_documento" class="form-control" placeholder="Albarán / factura">
            </div>
            <div class="col-md-6">
              <label class="form-label">Fecha</label>
              <input type="date" name="fecha" class="form-control" value="{{ hoy }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Escaneo o foto (PDF, PNG, JPG)</label>
            <input type="file" name="escaneo" class="form-control" accept=".pdf,.png,.jpg,.jpeg,.webp,application/pdf">
          </div>
          <div class="mb-3">
            <label class="form-label">Notas</label>
            <textarea name="notas" class="form-control" rows="2" placeholder="Observaciones"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Crear y continuar</button>
            <a href="{{ url_for('admin.inventario_albaranes') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
