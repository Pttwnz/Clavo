# Solo HTTP + ACME (primera vez, antes de tener certificado TLS).
# Cuando certbot haya creado /etc/letsencrypt/live/elclavo.gastromanager.es/,
# desactiva este sitio y activa el completo: nginx-sites/elclavo.gastromanager.es
#
server {
    listen 80;
    listen [::]:80;
    server_name elclavo.gastromanager.es;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 404;
    }
}
